<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&D Systems Automotriz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --negro:   #0a0a0a;
    --borde:   #222222;
    --texto:   #e8e8e8;
    --suave:   #666666;
    --naranja: #FF6B00;
    --naranja2:#FF8C00;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--negro);
    color: var(--texto);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .hero {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    gap: clamp(8px, 2vh, 24px);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,107,0,0.08);
    border: 1px solid rgba(255,107,0,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: clamp(9px, 1vw, 11px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--naranja);
    animation: fadeUp 0.6s ease both;
  }

  .hero-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--naranja);
    border-radius: 50%;
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-titulo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 120px);
    letter-spacing: 6px;
    line-height: 0.9;
    color: var(--texto);
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .hero-titulo span {
    color: var(--naranja);
    display: block;
  }

  .hero-subtitulo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(16px, 3vw, 36px);
    letter-spacing: 8px;
    color: var(--suave);
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .hero-desc {
    max-width: 500px;
    font-size: clamp(12px, 1.2vw, 15px);
    color: var(--suave);
    line-height: 1.6;
    font-weight: 300;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--naranja);
    color: #fff;
    text-decoration: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(16px, 1.5vw, 20px);
    letter-spacing: 3px;
    padding: clamp(12px, 1.5vh, 16px) clamp(24px, 3vw, 36px);
    border-radius: 8px;
    transition: all 0.2s;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .btn-primary:hover {
    background: var(--naranja2);
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(255,107,0,0.4);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    html, body { overflow: auto; }
    .hero { height: auto; min-height: 100vh; padding: 40px 20px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-badge">Sistema de Gestión Automotriz</div>

  <h1 class="hero-titulo">
    S&amp;D
    <span>SYSTEMS</span>
  </h1>

  <div class="hero-subtitulo">Automotriz</div>

  <p class="hero-desc">
    Plataforma integral para la gestión de talleres automotrices. Control de vehículos, propietarios, órdenes de servicio, inventario y finanzas en un solo lugar.
  </p>

  <a href="https://sd-systems-automotriz.syd-systems2001.workers.dev/" class="btn-primary">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    INICIAR SESIÓN
  </a>
</section>

</body>
</html>
