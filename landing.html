<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S&D Systems Automotriz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --negro:   #0a0a0a;
    --borde:   #222222;
    --texto:   #e8e8e8;
    --suave:   #666666;
    --naranja: #FF6B00;
    --naranja2:#FF8C00;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--negro);
    color: var(--texto);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(255,107,0,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--borde);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-marca {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--naranja);
    line-height: 1;
  }
  .logo-sep { width: 1px; height: 28px; background: var(--borde); }
  .logo-sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--suave);
    text-transform: uppercase;
    font-weight: 300;
    line-height: 1.4;
  }
  .btn-acceso {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--naranja);
    color: #fff;
    text-decoration: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 10px 24px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .btn-acceso:hover {
    background: var(--naranja2);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,107,0,0.3);
  }
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--borde);
    font-size: 11px;
    color: #333;
    letter-spacing: 2px;
    margin-top: auto;
  }
  footer span { color: var(--naranja); }
  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    .logo-sub { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-marca">S&D</div>
    <div class="logo-sep"></div>
    <div class="logo-sub">Systems<br>Automotriz</div>
  </div>
  <a href="https://syd-systems.github.io/sd-systems-automotriz/" class="btn-acceso">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" y1="12" x2="3" y2="12"/>
    </svg>
    Ingresar al Sistema
  </a>
</header>

<footer>
  <span>S&D</span> SYSTEMS AUTOMOTRIZ &nbsp;·&nbsp; SISTEMA DE GESTIÓN INTEGRAL
</footer>

</body>
</html>
